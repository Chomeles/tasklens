name: windows

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet build TaskLens.sln -c Release
      # Smoke-run the real NtQuerySystemInformation path against the live OS (task 10).
      - run: dotnet test tests/TaskLens.App.SmokeTests -c Release --no-build --logger "console;verbosity=minimal"
      - run: dotnet format TaskLens.sln --verify-no-changes

name: release

on:
  push:
    tags: ["v*"]
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish win-x64
        run: >
          dotnet publish src/TaskLens.App/TaskLens.App.csproj -c Release
          -r win-x64 --self-contained true -p:PublishSingleFile=false
          -o publish/win-x64

      - name: Publish win-arm64
        run: >
          dotnet publish src/TaskLens.App/TaskLens.App.csproj -c Release
          -r win-arm64 --self-contained true -p:PublishSingleFile=false
          -o publish/win-arm64

      - name: Zip artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if (-not ($version -like "v*")) { $version = "v0.0.0-dryrun" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path publish/win-x64/* -DestinationPath "dist/TaskLens-$version-win-x64.zip"
          Compress-Archive -Path publish/win-arm64/* -DestinationPath "dist/TaskLens-$version-win-arm64.zip"

      - name: SHA-256 checksums
        shell: pwsh
        run: |
          Get-ChildItem dist/*.zip | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File -Append -FilePath dist/SHA256SUMS.txt -Encoding ascii
          }
          Get-Content dist/SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: TaskLens-release
          path: dist/*

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

name: linux

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet build TaskLens.Linux.slnf -c Release
      - run: dotnet test tests/TaskLens.Core.Tests -c Release --no-build --logger "console;verbosity=minimal"
      - run: dotnet format TaskLens.Linux.slnf --verify-no-changes
